<!DOCTYPE html>
<html lang="en">

<head>

    <meta charset="UTF-8">

    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <title>Admin Panel</title>

    <link rel="stylesheet" href="css/style.css">

</head>

<body>

    <div class="form-container">

        <h1>Add Product</h1>

        <form id="productForm">

            <input 
                type="text"
                id="name"
                placeholder="Product Name"
                required
            >

            <input 
                type="number"
                id="price"
                placeholder="Price"
                required
            >

            <input 
                type="text"
                id="image"
                placeholder="Image URL"
                required
            >

            <textarea 
                id="description"
                placeholder="Description"
            ></textarea>

            <input 
                type="number"
                id="stock"
                placeholder="Stock"
                required
            >

            <button type="submit">
                Add Product
            </button>

        </form>

    </div>

    <script src="js/admin.js"></script>

</body>

</html>
